version: 2
registries:
  jointjs-registry:
    type: npm-registry
    url: https://npm.jointjs.com/api/v4/projects/77690663/packages/npm/
    token: ${{secrets.JOINTJS_NPM_TOKEN}}
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    allow:
      - dependency-type: "direct"
    # Serialize all Dependabot PRs to prevent merge conflicts
    # on the package.json and yarn.lock files
    open-pull-requests-limit: 1
    registries:
      - jointjs-registry
    ignore:
      - dependency-name: "madge"
        update-types: ["version-update:semver-major"]
